<style>
  :root {
    --bg: #0f172a; --panel: #1e293b; --border: #334155;
    --text: #e2e8f0; --muted: #94a3b8;
    --accent: #38bdf8; --bad: #ef4444; --ok: #10b981;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
    background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
    color: var(--text);
    font: 14px/1.55 "Noto Sans Georgian", "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  }
  .gate {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 32px 28px 28px;
    width: 100%; max-width: 420px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }
  h1 { margin: 0 0 6px; font-size: 18px; letter-spacing: -0.01em; }
  .sub { color: var(--muted); font-size: 12px; margin-bottom: 22px; }
  label { display: block; color: var(--muted); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  input[type=password] {
    width: 100%; padding: 10px 12px;
    background: #0b1322; color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    font-family: "JetBrains Mono", "SF Mono", Menlo, monospace;
    font-size: 14px; letter-spacing: 0.03em;
    outline: none; transition: border-color 0.15s;
  }
  input[type=password]:focus { border-color: var(--accent); }
  button {
    width: 100%; margin-top: 14px; padding: 10px 12px;
    background: var(--accent); color: #0b1322;
    border: 0; border-radius: 8px; font-weight: 600;
    cursor: pointer; font-size: 14px;
  }
  button:disabled { opacity: 0.5; cursor: progress; }
  .status { margin-top: 14px; font-size: 12px; min-height: 16px; }
  .status.err { color: var(--bad); }
  .status.ok { color: var(--ok); }
  .muted { color: var(--muted); font-size: 11px; margin-top: 16px; line-height: 1.5; }
  .muted code { background: rgba(255,255,255,0.08); padding: 1px 6px; border-radius: 4px; }
</style>

const ITER     = 250000;

const b64ToBytes = (s) => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function deriveKey(password, saltBytes) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey(
    "raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: saltBytes, iterations: ITER, hash: "SHA-256" },
    baseKey,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

async function tryDecrypt(password) {
  const salt = b64ToBytes(SALT_B64);
  const iv   = b64ToBytes(IV_B64);
  const ct   = b64ToBytes(CT_B64);
  const key  = await deriveKey(password, salt);
  const pt   = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
  return new TextDecoder("utf-8").decode(pt);
}

function setStatus(msg, cls) {
  const s = document.getElementById("s");
  s.textContent = msg || "";
  s.className = "status" + (cls ? " " + cls : "");
}

document.getElementById("f").addEventListener("submit", async () => {
  const p = document.getElementById("p").value;
  const btn = document.getElementById("b");
  if (!p) { setStatus("enter password", "err"); return; }
  btn.disabled = true;
  setStatus("deriving key (250k iterations)...");
  try {
    const html = await tryDecrypt(p);
    setStatus("✓ decrypted — rendering", "ok");
    // Replace the whole document with the decrypted content.
    // history.replaceState prevents back-button from landing on the gate.
    const blob = new Blob([html], { type: "text/html" });
    const url  = URL.createObjectURL(blob);
    location.replace(url);
  } catch (err) {
    setStatus("✗ wrong password", "err");
    btn.disabled = false;
    document.getElementById("p").select();
  }
});
</script>

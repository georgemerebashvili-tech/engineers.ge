<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprinkler Physics · Prototype</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; overflow: hidden; background: #0b1220; font-family: -apple-system, "Noto Sans Georgian", system-ui, sans-serif; color: #e2e8f0; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  #ui {
    position: fixed; top: 12px; left: 12px;
    background: rgba(15, 23, 42, 0.86);
    border: 1px solid rgba(148, 163, 184, 0.25);
    border-radius: 10px;
    padding: 12px 14px;
    backdrop-filter: blur(8px);
    font-size: 12px;
    min-width: 240px;
    z-index: 10;
  }
  #ui h3 { margin: 0 0 8px; font-size: 13px; font-weight: 700; letter-spacing: 0.02em; color: #f8fafc; }
  #ui .row { display: flex; gap: 6px; align-items: center; margin-top: 6px; flex-wrap: wrap; }
  #ui .stat { display: flex; justify-content: space-between; padding: 3px 0; color: #cbd5e1; }
  #ui .stat b { color: #f1f5f9; font-variant-numeric: tabular-nums; }
  #ui button {
    background: #1565C0; color: white; border: none;
    padding: 6px 10px; border-radius: 6px; cursor: pointer;
    font-family: inherit; font-size: 11px; font-weight: 600;
    transition: 0.12s;
  }
  #ui button:hover { background: #0d47a1; }
  #ui button.ghost { background: transparent; border: 1px solid rgba(148, 163, 184, 0.4); color: #e2e8f0; }
  #ui button.ghost:hover { background: rgba(148, 163, 184, 0.12); }
  #ui button.warn { background: #dc2626; }
  #ui button.warn:hover { background: #b91c1c; }
  #ui label { color: #94a3b8; font-size: 11px; }
  #ui input[type=range] { flex: 1; accent-color: #1565C0; }
  #ui .hint { color: #64748b; font-size: 10px; margin-top: 8px; line-height: 1.4; }
  #ui .sep { border-top: 1px solid rgba(148, 163, 184, 0.18); margin: 10px 0; }

  #crosshair-mode {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(15, 23, 42, 0.86);
    border: 1px solid rgba(148, 163, 184, 0.25);
    border-radius: 8px;
    padding: 8px 14px; font-size: 11px; color: #cbd5e1;
    z-index: 10; pointer-events: none;
  }
  #crosshair-mode b { color: #60a5fa; }
</style>
</head>
<body>

<div id="app"></div>

<div id="ui">
  <h3>💧 Sprinkler Physics</h3>

  <div class="stat"><span>სპრინკლერები</span><b id="st-sprinklers">0</b></div>
  <div class="stat"><span>წვეთები (აქტიური)</span><b id="st-droplets">0</b></div>
  <div class="stat"><span>Budget (cap)</span><b id="st-budget">1000</b></div>
  <div class="stat"><span>Per-sprinkler / წმ</span><b id="st-rate">—</b></div>
  <div class="stat"><span>FPS</span><b id="st-fps">—</b></div>

  <div class="sep"></div>

  <div class="row">
    <button onclick="addSprinkler()">+ სპრინკლერი</button>
    <button class="ghost" onclick="removeSprinkler()">− ამოშლა</button>
  </div>

  <div class="row" style="margin-top: 10px;">
    <label>Budget</label>
    <input type="range" id="budgetSlider" min="200" max="3000" value="1000" step="100">
    <span id="budgetVal" style="min-width: 38px; text-align: right;">1000</span>
  </div>

  <div class="row">
    <label>Spread</label>
    <input type="range" id="spreadSlider" min="5" max="60" value="25" step="1">
    <span id="spreadVal" style="min-width: 38px; text-align: right;">25°</span>
  </div>

  <div class="row">
    <label>Pressure</label>
    <input type="range" id="pressureSlider" min="2" max="14" value="7" step="0.5">
    <span id="pressureVal" style="min-width: 38px; text-align: right;">7.0</span>
  </div>

  <div class="sep"></div>

  <div class="row">
    <button class="ghost" onclick="togglePause()"><span id="pauseLbl">⏸ pause</span></button>
    <button class="warn" onclick="resetAll()">reset</button>
  </div>

  <div class="hint">
    Mouse drag — ბრუნვა · wheel — zoom · right-click drag — pan<br>
    სპრინკლერს — drag: ხელახალი განთავსება (მალე)
  </div>
</div>

<div id="crosshair-mode">კუბ-გარემო: ოთახი 6×4×3 მ · ავეჯი რეალური ზომებით · წყალი Rapier3D physics-ით</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "@dimforge/rapier3d-compat": "https://cdn.skypack.dev/@dimforge/rapier3d-compat@0.12.0"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import RAPIER from '@dimforge/rapier3d-compat';

// ============================================================
// CONFIG
// ============================================================
let MAX_DROPLETS = 1000;
let AVG_LIFETIME = 2.8;       // seconds before a droplet gets recycled
let SPREAD_DEG = 25;
let PRESSURE = 7.0;           // m/s initial speed from nozzle
const DROPLET_RADIUS = 0.012; // 1.2 cm
const DROPLET_DENSITY = 1000; // kg/m³

// ============================================================
// THREE
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b1220);
scene.fog = new THREE.Fog(0x0b1220, 12, 30);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.05, 120);
camera.position.set(5.5, 3.4, 6.2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
document.getElementById('app').appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1, 0);
controls.enableDamping = true;
controls.maxPolarAngle = Math.PI * 0.49;
controls.minDistance = 2;
controls.maxDistance = 20;

// Lights
const hemi = new THREE.HemisphereLight(0xc4ddff, 0x1a2238, 0.55);
scene.add(hemi);
const key = new THREE.DirectionalLight(0xffffff, 1.6);
key.position.set(4, 8, 5);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.left = -6;
key.shadow.camera.right = 6;
key.shadow.camera.top = 6;
key.shadow.camera.bottom = -6;
key.shadow.bias = -0.0004;
scene.add(key);

// ============================================================
// RAPIER
// ============================================================
await RAPIER.init();
const gravity = new RAPIER.Vector3(0, -9.81, 0);
const world = new RAPIER.World(gravity);
const eventQueue = new RAPIER.EventQueue(true);

// Helper: create a static box collider and matching mesh
function makeBox({ x, y, z, w, h, d, color = 0x94a3b8, metal = 0.05, rough = 0.75, name = '' }) {
  const geom = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshStandardMaterial({ color, metalness: metal, roughness: rough });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.userData.name = name;
  scene.add(mesh);

  const rbDesc = RAPIER.RigidBodyDesc.fixed().setTranslation(x, y, z);
  const rb = world.createRigidBody(rbDesc);
  const colDesc = RAPIER.ColliderDesc.cuboid(w / 2, h / 2, d / 2)
    .setRestitution(0.04)
    .setFriction(0.7);
  world.createCollider(colDesc, rb);
  return mesh;
}

// ============================================================
// ROOM (6 × 3 × 4 m)
// ============================================================
// Floor
const floorGeom = new THREE.PlaneGeometry(30, 30);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.9 });
const floor = new THREE.Mesh(floorGeom, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);
const floorBody = world.createRigidBody(RAPIER.RigidBodyDesc.fixed());
world.createCollider(RAPIER.ColliderDesc.cuboid(15, 0.05, 15).setTranslation(0, -0.05, 0), floorBody);

// Grid (subtle)
const grid = new THREE.GridHelper(20, 20, 0x475569, 0x1e293b);
grid.material.opacity = 0.35;
grid.material.transparent = true;
scene.add(grid);

// ============================================================
// FURNITURE (რეალური ზომები ~მ)
// ============================================================
// Table: 1.6 × 0.75 × 0.9 m, legs + top
makeBox({ x: -1.2, y: 0.74, z: 0.5, w: 1.6, h: 0.04, d: 0.9, color: 0x92400e, rough: 0.55, name: 'table-top' });
// table legs (4)
for (const [lx, lz] of [[-0.75, -0.4], [0.75, -0.4], [-0.75, 0.4], [0.75, 0.4]]) {
  makeBox({ x: -1.2 + lx, y: 0.36, z: 0.5 + lz, w: 0.06, h: 0.72, d: 0.06, color: 0x78350f, rough: 0.55 });
}

// Chair: seat 0.45×0.45, height 0.45, back +0.45
// seat
makeBox({ x: -0.4, y: 0.46, z: 1.4, w: 0.45, h: 0.04, d: 0.45, color: 0x7c3aed, rough: 0.6 });
// chair legs
for (const [lx, lz] of [[-0.19, -0.19], [0.19, -0.19], [-0.19, 0.19], [0.19, 0.19]]) {
  makeBox({ x: -0.4 + lx, y: 0.22, z: 1.4 + lz, w: 0.03, h: 0.44, d: 0.03, color: 0x4c1d95, rough: 0.55 });
}
// chair back
makeBox({ x: -0.4, y: 0.72, z: 1.4 - 0.21, w: 0.45, h: 0.48, d: 0.03, color: 0x7c3aed, rough: 0.6 });

// Closed box / crate: 0.6 × 0.5 × 0.5
makeBox({ x: 1.8, y: 0.25, z: 1.2, w: 0.6, h: 0.5, d: 0.5, color: 0xcd853f, rough: 0.85 });

// Car-like (simplified sedan): 4.5 × 1.4 × 1.8
// body lower
makeBox({ x: 2.2, y: 0.45, z: -1.4, w: 4.5, h: 0.6, d: 1.8, color: 0xef4444, metal: 0.35, rough: 0.35 });
// body cabin
makeBox({ x: 2.2, y: 1.05, z: -1.4, w: 2.4, h: 0.6, d: 1.65, color: 0xdc2626, metal: 0.35, rough: 0.25 });
// wheels (4) as low cylinders approximated with boxes
for (const [wx, wz] of [[-1.6, -0.7], [1.6, -0.7], [-1.6, 0.7], [1.6, 0.7]]) {
  makeBox({ x: 2.2 + wx, y: 0.27, z: -1.4 + wz, w: 0.55, h: 0.55, d: 0.3, color: 0x111827, rough: 0.95 });
}

// Cabinet: 0.8 × 1.8 × 0.4
makeBox({ x: -3.2, y: 0.9, z: -0.2, w: 0.8, h: 1.8, d: 0.4, color: 0x52525b, rough: 0.65 });

// Small pallet box: 0.4 × 0.4 × 0.4
makeBox({ x: -2.4, y: 0.2, z: 1.8, w: 0.4, h: 0.4, d: 0.4, color: 0xa16207, rough: 0.85 });

// ============================================================
// DROPLET POOL
// ============================================================
const sphereGeom = new THREE.SphereGeometry(DROPLET_RADIUS, 8, 6);
const dropletMat = new THREE.MeshStandardMaterial({
  color: 0x38bdf8,
  metalness: 0.1,
  roughness: 0.15,
  transparent: true,
  opacity: 0.88,
  emissive: 0x0891b2,
  emissiveIntensity: 0.12,
});

let dropletMesh = null;
let droplets = []; // { body, active, age, instIdx }
const HIDDEN = new THREE.Matrix4().makeScale(0, 0, 0); // hide inactive instances

function rebuildDropletPool(cap) {
  // Dispose old
  if (dropletMesh) {
    scene.remove(dropletMesh);
    dropletMesh.dispose();
  }
  for (const d of droplets) {
    if (d.body) world.removeRigidBody(d.body);
  }
  droplets = [];

  dropletMesh = new THREE.InstancedMesh(sphereGeom, dropletMat, cap);
  dropletMesh.frustumCulled = false;
  dropletMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  scene.add(dropletMesh);

  for (let i = 0; i < cap; i++) {
    const rbDesc = RAPIER.RigidBodyDesc.dynamic()
      .setTranslation(0, -1000, 0) // park far away
      .setCcdEnabled(true)
      .setLinearDamping(0.05)
      .setGravityScale(0);
    const rb = world.createRigidBody(rbDesc);
    const colDesc = RAPIER.ColliderDesc.ball(DROPLET_RADIUS)
      .setDensity(DROPLET_DENSITY)
      .setRestitution(0.02)
      .setFriction(0.4);
    world.createCollider(colDesc, rb);
    rb.sleep();
    droplets.push({ body: rb, active: false, age: 0, instIdx: i });
    dropletMesh.setMatrixAt(i, HIDDEN);
  }
  dropletMesh.instanceMatrix.needsUpdate = true;
}

rebuildDropletPool(MAX_DROPLETS);

// ============================================================
// SPRINKLERS
// ============================================================
const sprinklers = []; // { mesh, pos: Vector3, dir: Vector3, accum: 0 }

function createSprinklerVisual() {
  const g = new THREE.Group();
  // stem
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.22, 12), new THREE.MeshStandardMaterial({ color: 0xcbd5e1, metalness: 0.7, roughness: 0.3 }));
  stem.position.y = 0.11;
  g.add(stem);
  // head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.055, 16, 12), new THREE.MeshStandardMaterial({ color: 0xef4444, metalness: 0.4, roughness: 0.25 }));
  head.position.y = 0.24;
  g.add(head);
  g.children.forEach(c => { c.castShadow = true; });
  return g;
}

function addSprinkler(pos = null, dir = null) {
  // default: random-ish position on ceiling (Y = 2.7), facing down
  const position = pos || new THREE.Vector3(
    (Math.random() - 0.5) * 5.5,
    2.7,
    (Math.random() - 0.5) * 3.5
  );
  const direction = (dir || new THREE.Vector3(0, -1, 0)).clone().normalize();

  const mesh = createSprinklerVisual();
  mesh.position.copy(position);
  // orient stem along -dir (so head is "below" if pointing down)
  const up = new THREE.Vector3(0, 1, 0);
  const axis = new THREE.Vector3().crossVectors(up, direction).normalize();
  const angle = Math.acos(up.dot(direction));
  if (axis.lengthSq() > 0.001) mesh.quaternion.setFromAxisAngle(axis, angle - Math.PI);
  else if (direction.y > 0) mesh.rotation.x = Math.PI;
  scene.add(mesh);

  sprinklers.push({ mesh, pos: position, dir: direction, accum: 0 });
  updateHUD();
}
window.addSprinkler = () => addSprinkler();

function removeSprinkler() {
  const s = sprinklers.pop();
  if (!s) return;
  scene.remove(s.mesh);
  s.mesh.children.forEach(c => { c.geometry.dispose(); c.material.dispose(); });
  updateHUD();
}
window.removeSprinkler = removeSprinkler;

// seed with 3
for (let i = 0; i < 3; i++) addSprinkler();

// ============================================================
// DROPLET SPAWN
// ============================================================
function spawnDroplet(s) {
  // find inactive
  const d = droplets.find(x => !x.active);
  if (!d) return false;

  // random direction within cone around s.dir
  const spreadRad = SPREAD_DEG * Math.PI / 180;
  const theta = Math.random() * 2 * Math.PI;
  const phi = Math.random() * spreadRad; // polar from axis
  // build basis (tangent, bitangent) perpendicular to s.dir
  const axis = s.dir;
  const tmp = Math.abs(axis.y) < 0.9 ? new THREE.Vector3(0, 1, 0) : new THREE.Vector3(1, 0, 0);
  const tangent = new THREE.Vector3().crossVectors(axis, tmp).normalize();
  const bitangent = new THREE.Vector3().crossVectors(axis, tangent).normalize();
  const sinP = Math.sin(phi), cosP = Math.cos(phi);
  const cosT = Math.cos(theta), sinT = Math.sin(theta);
  const dir = new THREE.Vector3()
    .addScaledVector(axis, cosP)
    .addScaledVector(tangent, sinP * cosT)
    .addScaledVector(bitangent, sinP * sinT)
    .normalize();

  const vel = dir.multiplyScalar(PRESSURE * (0.92 + Math.random() * 0.16));

  d.body.setTranslation({ x: s.pos.x + axis.x * 0.06, y: s.pos.y + axis.y * 0.06, z: s.pos.z + axis.z * 0.06 }, true);
  d.body.setLinvel({ x: vel.x, y: vel.y, z: vel.z }, true);
  d.body.setAngvel({ x: 0, y: 0, z: 0 }, true);
  d.body.setGravityScale(1.0, true);
  d.body.wakeUp();
  d.active = true;
  d.age = 0;
  return true;
}

function recycle(d) {
  d.active = false;
  d.age = 0;
  d.body.setLinvel({ x: 0, y: 0, z: 0 }, true);
  d.body.setAngvel({ x: 0, y: 0, z: 0 }, true);
  d.body.setTranslation({ x: 0, y: -1000, z: 0 }, true);
  d.body.setGravityScale(0, true);
  d.body.sleep();
  dropletMesh.setMatrixAt(d.instIdx, HIDDEN);
}

// ============================================================
// HUD
// ============================================================
const hud = {
  sprinklers: document.getElementById('st-sprinklers'),
  droplets: document.getElementById('st-droplets'),
  budget: document.getElementById('st-budget'),
  rate: document.getElementById('st-rate'),
  fps: document.getElementById('st-fps'),
};
function updateHUD() {
  hud.sprinklers.textContent = sprinklers.length;
  const active = droplets.reduce((n, d) => n + (d.active ? 1 : 0), 0);
  hud.droplets.textContent = `${active} / ${MAX_DROPLETS}`;
  hud.budget.textContent = MAX_DROPLETS;
  if (sprinklers.length > 0) {
    const rate = MAX_DROPLETS / sprinklers.length / AVG_LIFETIME;
    hud.rate.textContent = rate.toFixed(1);
  } else {
    hud.rate.textContent = '—';
  }
}

// Controls
document.getElementById('budgetSlider').addEventListener('input', (e) => {
  MAX_DROPLETS = parseInt(e.target.value, 10);
  document.getElementById('budgetVal').textContent = MAX_DROPLETS;
  rebuildDropletPool(MAX_DROPLETS);
  updateHUD();
});
document.getElementById('spreadSlider').addEventListener('input', (e) => {
  SPREAD_DEG = parseFloat(e.target.value);
  document.getElementById('spreadVal').textContent = SPREAD_DEG + '°';
});
document.getElementById('pressureSlider').addEventListener('input', (e) => {
  PRESSURE = parseFloat(e.target.value);
  document.getElementById('pressureVal').textContent = PRESSURE.toFixed(1);
});

let paused = false;
window.togglePause = () => {
  paused = !paused;
  document.getElementById('pauseLbl').textContent = paused ? '▶ resume' : '⏸ pause';
};
window.resetAll = () => {
  for (const d of droplets) if (d.active) recycle(d);
  updateHUD();
};

// ============================================================
// LOOP
// ============================================================
const clock = new THREE.Clock();
const tmpMat = new THREE.Matrix4();
const tmpQuat = new THREE.Quaternion();
const tmpScale = new THREE.Vector3(1, 1, 1);
let fpsEma = 60, lastT = performance.now();

function tick() {
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), 1 / 30);
  if (paused) {
    renderer.render(scene, camera);
    return;
  }

  // physics
  world.step(eventQueue);

  // spawn budget: each sprinkler aims at MAX/N/LIFE per second
  if (sprinklers.length > 0) {
    const ratePerS = MAX_DROPLETS / sprinklers.length / AVG_LIFETIME;
    for (const s of sprinklers) {
      s.accum += dt * ratePerS;
      while (s.accum >= 1) {
        if (!spawnDroplet(s)) { s.accum = 0; break; }
        s.accum -= 1;
      }
    }
  }

  // update active droplets
  for (const d of droplets) {
    if (!d.active) continue;
    d.age += dt;
    const t = d.body.translation();
    // recycle condition: too old, below floor, or far away
    if (d.age > AVG_LIFETIME || t.y < -0.3 || Math.abs(t.x) > 14 || Math.abs(t.z) > 14) {
      recycle(d);
      continue;
    }
    const r = d.body.rotation();
    tmpQuat.set(r.x, r.y, r.z, r.w);
    tmpMat.compose({ x: t.x, y: t.y, z: t.z }, tmpQuat, tmpScale);
    dropletMesh.setMatrixAt(d.instIdx, tmpMat);
  }
  dropletMesh.instanceMatrix.needsUpdate = true;

  // HUD periodic
  const now = performance.now();
  const instFps = 1000 / Math.max(1, now - lastT);
  lastT = now;
  fpsEma = fpsEma * 0.92 + instFps * 0.08;
  if ((now | 0) % 8 === 0) {
    hud.fps.textContent = fpsEma.toFixed(0);
    const active = droplets.reduce((n, d) => n + (d.active ? 1 : 0), 0);
    hud.droplets.textContent = `${active} / ${MAX_DROPLETS}`;
  }

  controls.update();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

updateHUD();
tick();
</script>

</body>
</html>
